<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おみこしハブ：配布所</title>
    <style>
        /* 全体の背景と文字 */
        body { 
            background-color: #1a1a1a; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 30px 10px;
            margin: 0;
        }
        h1 { 
            color: #ff0000; 
            font-size: 28px; 
            margin-bottom: 5px; 
            text-shadow: 0 0 10px rgba(255,0,0,0.5);
        }
        .subtitle { 
            font-size: 14px; 
            color: #888; 
            margin-bottom: 30px; 
            letter-spacing: 3px;
        }
        /* ボタンのコンテナ（枠） */
        .container { 
            display: flex; 
            width: 90%; 
            max-width: 400px; 
            margin-bottom: 15px; 
            height: 65px; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 2px solid #333; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
        }
        /* 左側の赤ラベル */
        .label { 
            background-color: #ff0000; 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-size: 16px; 
            text-align: center;
            line-height: 1.2;
        }
        /* 右側の緑COPYボタン */
        .copy-btn { 
            background-color: #00ff00; 
            color: black; 
            border: none; 
            width: 100px; 
            font-weight: 900; 
            font-size: 18px; 
            cursor: pointer; 
            transition: 0.2s ease;
        }
        /* ボタンを押したときの演出 */
        .copy-btn:active { 
            background-color: #00cc00; 
            transform: scale(0.9); 
        }
        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #444;
        }
    </style>
</head>
<body>

    <h1>おみこしハブ</h1>
    <div class="subtitle">OFFICIAL HUB v1.0</div>

    <div class="container">
        <div class="label">GUEST HUB<br>v1.0</div>
        <button class="copy-btn" onclick="copy('https://rentry.co/omikoshi-guest/raw')">COPY</button>
    </div>

    <div class="container">
        <div class="label">ブロフル<br>実自動回収</div>
        <button class="copy-btn" onclick="copy('https://rentry.co/omikoshi-bf/raw')">COPY</button>
    </div>

    <div class="footer">© 2026 OMIKOSHI HUB</div>

    <script>
        // コピー機能のスクリプト
        function copy(url) {
            const loadstring = `loadstring(game:HttpGet("${url}"))()`;
            
            // クリップボードに書き込み
            navigator.clipboard.writeText(loadstring).then(() => {
                alert("おみこしハブ：コピー成功！\nRobloxの実行環境に貼り付けて実行してな！");
            }).catch(err => {
                alert("エラー：コピーに失敗したぜ。ブラウザの権限を確認してくれ。");
            });
        }
    </script>
</body>
</html>
