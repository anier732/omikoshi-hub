<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おみこしハブ：世界選択モデル</title>
    <style>
        body { background-color: #0a0a0a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        h1 { color: #ff0000; font-size: 28px; margin-bottom: 5px; text-shadow: 0 0 15px #f00; }
        .version { font-size: 12px; color: #ffaa00; margin-bottom: 25px; letter-spacing: 2px; }
        .container { display: flex; width: 90%; max-width: 400px; height: 85px; border-radius: 15px; overflow: hidden; border: 3px solid #444; box-shadow: 0 0 20px rgba(255,0,0,0.3); }
        .label { background-color: #ff0000; flex: 1.2; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; text-align: center; line-height: 1.3; }
        .copy-btn { background-color: #00ff00; color: black; border: none; width: 110px; font-weight: 900; font-size: 22px; cursor: pointer; transition: 0.1s; }
        .copy-btn:active { background-color: #00aa00; transform: scale(0.9); }
        .footer { margin-top: 30px; color: #555; font-size: 11px; text-align: center; line-height: 1.5; }
    </style>
</head>
<body>

    <h1>おみこしハブ</h1>
    <div class="version">V105: WORLD SELECT</div>

    <div class="container">
        <div class="label">ブロフル実自動回収<br>【第1・2・3世界対応】</div>
        <button class="copy-btn" id="copyBtn">COPY</button>
    </div>

    <div class="footer">
        ※スクリプト実行後、ハブの画面で<br>
        自分のいるSeaを選んでから「ON」にしてな！
    </div>

    <script>
        const fullScript = `-- おみこしハブ V105: WORLD SELECT (Fixed Error 773)
local TweenService = game:GetService("TweenService")
local HttpService = game:GetService("HttpService")
local TeleportService = game:GetService("TeleportService")
local Players = game:GetService("Players")
local RunService = game:GetService("RunService")
local SoundService = game:GetService("SoundService")
local CoreGui = game:GetService("CoreGui")
local Player = Players.LocalPlayer

-- 1. ゴッドリスト & 設定
local GOD_LIST = {"LEOPARD", "DOUGH", "DRAGON", "KITSUNE", "SPIRIT", "VENOM", "T-REX"}
local GLIDE_SPEED = 150 
local CurrentSea = 2 -- 初期設定

-- 2. UI構築
if CoreGui:FindFirstChild("OmikoshiHub") then CoreGui.OmikoshiHub:Destroy() end
local sg = Instance.new("ScreenGui", CoreGui); sg.Name = "OmikoshiHub"

local flash = Instance.new("Frame", sg)
flash.Size = UDim2.new(1, 0, 1, 0); flash.BackgroundColor3 = Color3.new(1, 0, 0); flash.BackgroundTransparency = 1; flash.ZIndex = 999

local main = Instance.new("Frame", sg)
main.Size = UDim2.new(0, 260, 0, 360); main.Position = UDim2.new(0.4, 0, 0.3, 0)
main.BackgroundColor3 = Color3.fromRGB(20, 0, 40); main.BorderSizePixel = 3; main.BorderColor3 = Color3.fromRGB(255, 215, 0); main.Active = true; main.Draggable = true
main.ClipsDescendants = true

local title = Instance.new("TextLabel", main)
title.Size = UDim2.new(1, -30, 0, 30); title.Text = "おみこしハブ V105"; title.TextColor3 = Color3.new(1, 1, 1); title.BackgroundColor3 = Color3.fromRGB(60, 0, 120); title.Font = Enum.Font.SourceSansBold

local minBtn = Instance.new("TextButton", main)
minBtn.Size = UDim2.new(0, 30, 0, 30); minBtn.Position = UDim2.new(1, -30, 0, 0); minBtn.Text = "-"; minBtn.TextSize = 25; minBtn.BackgroundColor3 = Color3.fromRGB(80, 0, 0); minBtn.TextColor3 = Color3.new(1, 1, 1)

local content = Instance.new("Frame", main)
content.Size = UDim2.new(1, 0, 1, -30); content.Position = UDim2.new(0, 0, 0, 30); content.BackgroundTransparency = 1

local info = Instance.new("TextLabel", content)
info.Size = UDim2.new(1, 0, 0, 20); info.Text = "実: 0個 (監視中...)"; info.TextColor3 = Color3.new(1, 1, 0); info.BackgroundTransparency = 1

-- 3. 世界選択ボタン
local seaTitle = Instance.new("TextLabel", content)
seaTitle.Size = UDim2.new(1, 0, 0, 20); seaTitle.Position = UDim2.new(0, 0, 0, 30); seaTitle.Text = "-- 世界選択 --"; seaTitle.TextColor3 = Color3.new(1, 1, 1); seaTitle.BackgroundTransparency = 1

local seaFrame = Instance.new("Frame", content)
seaFrame.Size = UDim2.new(1, -20, 0, 30); seaFrame.Position = UDim2.new(0, 10, 0, 50); seaFrame.BackgroundTransparency = 1

for i = 1, 3 do
    local sBtn = Instance.new("TextButton", seaFrame)
    sBtn.Size = UDim2.new(0.3, 0, 1, 0); sBtn.Position = UDim2.new((i-1)*0.35, 0, 0, 0)
    sBtn.Text = "Sea " .. i; sBtn.BackgroundColor3 = (i == 2 and Color3.fromRGB(150, 0, 0) or Color3.fromRGB(50, 50, 50))
    sBtn.TextColor3 = Color3.new(1, 1, 1)
    sBtn.MouseButton1Click:Connect(function()
        CurrentSea = i
        for _, b in pairs(seaFrame:GetChildren()) do b.BackgroundColor3 = Color3.fromRGB(50, 50, 50) end
        sBtn.BackgroundColor3 = Color3.fromRGB(150, 0, 0)
    end)
end

-- 4. メイン機能
local btnGlide = Instance.new("TextButton", content)
btnGlide.Size = UDim2.new(1, -20, 0, 40); btnGlide.Position = UDim2.new(0, 10, 0, 100); btnGlide.Text = "実へ滑空"; btnGlide.BackgroundColor3 = Color3.fromRGB(0, 120, 255); btnGlide.TextColor3 = Color3.new(1, 1, 1)

local autoHop = false
local btnAuto = Instance.new("TextButton", content)
btnAuto.Size = UDim2.new(1, -20, 0, 40); btnAuto.Position = UDim2.new(0, 10, 0, 150); btnAuto.Text = "オートホップ: OFF"; btnAuto.BackgroundColor3 = Color3.fromRGB(80, 80, 80); btnAuto.TextColor3 = Color3.new(1, 1, 1)

-- サーバーホップロジック (773回避)
local function ServerHop()
    local PlaceIDs = {2753915549, 4442272183, 7449423635} -- Sea 1, 2, 3 のID
    local targetPlace = PlaceIDs[CurrentSea]
    local servers = HttpService:JSONDecode(game:HttpGet("https://games.roblox.com/v1/games/" .. targetPlace .. "/servers/Public?sortOrder=Asc&limit=100")).data
    for _, s in pairs(servers) do
        if s.playing < s.maxPlayers and s.id ~= game.JobId then
            TeleportService:TeleportToPlaceInstance(targetPlace, s.id)
            break
        end
    end
end

btnAuto.MouseButton1Click:Connect(function()
    autoHop = not autoHop
    btnAuto.Text = autoHop and "オートホップ: ON" or "オートホップ: OFF"
    btnAuto.BackgroundColor3 = autoHop and Color3.fromRGB(200, 100, 0) or Color3.fromRGB(80, 80, 80)
end)

-- 滑空 & 監視
local function GetValidFruits()
    local valid = {}
    local rareFound = false
    for _, v in pairs(game:GetDescendants()) do
        if v:IsA("BasePart") and v.Name:find("Fruit") then
            local n = v.Name:upper()
            if not (n:find("SHIP") or n:find("%.00") or n:find("FUSED") or n:find("%d")) then
                local p = v.Parent; local owned = false
                while p do
                    if p:IsA("Backpack") or (p:IsA("Model") and Players:GetPlayerFromCharacter(p)) then owned = true; break end
                    p = p.Parent
                end
                if not owned then table.insert(valid, v); for _, r in pairs(GOD_LIST) do if n:find(r) then rareFound = true end end end
            end
        end
    end
    return valid, rareFound
end

RunService.Heartbeat:Connect(function()
    local f, rare = GetValidFruits()
    info.Text = "実: " .. #f .. "個 (" .. (rare and "激レア!" or "監視中") .. ")"
    if #f > 0 then btnGlide.Text = "滑空: " .. f[1].Name else btnGlide.Text = "実がありません" end
end)

btnGlide.MouseButton1Click:Connect(function()
    local f = GetValidFruits()
    if f[1] then
        local hrp = Player.Character.HumanoidRootPart
        local bv = Instance.new("BodyVelocity", hrp); bv.Velocity = Vector3.zero; bv.MaxForce = Vector3.new(9e9, 9e9, 9e9)
        TweenService:Create(hrp, TweenInfo.new((f[1].Position - hrp.Position).Magnitude/GLIDE_SPEED, Enum.EasingStyle.Linear), {CFrame = f[1].CFrame}):Play()
        task.delay(2, function() bv:Destroy() end)
    end
end)

task.spawn(function()
    while task.wait(8) do
        if autoHop and #GetValidFruits() == 0 then ServerHop() end
    end
end)
`;

        document.getElementById('copyBtn').addEventListener('click', function() {
            navigator.clipboard.writeText(fullScript).then(() => {
                alert("おみこしハブ V105：コピー成功！\n実行後、Sea 1~3を選んでから開始してな！");
            });
        });
    </script>
</body>
</html>
